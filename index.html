<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onmyoji Kanji Seal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="homepage-screen" class="full-overlay container-fluid d-flex flex-column justify-content-center align-items-center text-center">
        <img src="assets/badge.webp" class="main-logo mb-3" alt="Logo">
        <h1 class="game-title display-4 fw-bold">ONMYOJI</h1>
        <p class="game-subtitle lead text-gold">KANJI SEAL RITUAL</p>
        <button class="btn btn-start-custom mt-4 px-5 py-2 rounded-pill fw-bold shadow" onclick="showLevelSelector()">MULAI RITUAL</button>
    </div>

    <div id="level-selector" class="full-overlay d-none text-center">
        <h2 class="text-gold mb-4">PILIH GULUNGAN SEGEL</h2>
        <div class="container overflow-auto" style="max-height: 70vh;">
            <div class="row g-3 justify-content-center">
                <div class="col-12">
                    <button class="btn btn-outline-info w-75 py-3 fw-bold" onclick="startMode('tutorial', 1)">📖 TUTORIAL (No Time Limit)</button>
                </div>
                <div class="col-12 mt-4"><h5 class="text-white-50 small">MAIN STORY</h5></div>
                <div class="col-12 d-flex flex-wrap justify-content-center gap-2">
                    <button class="btn btn-gold-oval" onclick="startMode('story', 1)">1</button>
                    <button class="btn btn-gold-oval" onclick="startMode('story', 2)">2</button>
                    <button class="btn btn-gold-oval" onclick="startMode('story', 3)">3</button>
                    <button class="btn btn-gold-oval" onclick="startMode('story', 4)">4</button>
                </div>
                <div class="col-12 mt-4">
                    <button class="btn btn-danger w-75 py-3 fw-bold shadow" onclick="startMode('challenge', 1)">🔥 CHALLENGE (Sudden Death)</button>
                </div>
            </div>
        </div>
        <button class="btn btn-link text-white mt-4" onclick="backToHome()">Kembali</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="game-layout container-fluid">
            <header class="row align-items-center py-2 gx-0">
                <div class="col-2 text-start"><img src="assets/badge.webp" class="icon-header"></div>
                <div class="col-8 px-2">
                    <div class="progress bg-dark border border-warning" style="height: 12px; border-radius: 6px;">
                        <div id="hp-progress" class="progress-bar bg-danger" style="width: 100%"></div>
                    </div>
                </div>
                <div class="col-2 text-end text-gold fw-bold small d-flex align-items-center justify-content-end gap-1">
                    <img src="assets/jam.webp" class="icon-jam"> <span id="time-val">90s</span>
                </div>
            </header>

            <main class="ritual-center text-center">
                <div id="stage-banner" class="badge rounded-pill bg-dark border border-gold px-3 mb-2 small">Stage 1</div>
                <div class="scroll-box mx-auto">
                    <div id="kanji-question" class="kanji-main"></div>
                    <div id="kanji-meaning" class="meaning-sub"></div>
                </div>
                <div id="word-zone" class="answer-row d-flex justify-content-center gap-1 my-3"></div>
                <div class="action-footer container">
                    <div id="support-container" class="d-flex justify-content-center gap-2 mb-2"></div>
                    <button id="confirm-btn" class="btn-segel-main" onclick="confirmWord()"></button>
                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <button class="btn btn-gold-oval btn-sm px-3" onclick="clearWord()">Hapus</button>
                        <button class="btn btn-gold-oval btn-sm px-3" onclick="showHint()">Hint</button>
                        <button id="romaji-toggle-btn" class="btn btn-gold-oval btn-sm px-3" onclick="toggleRomaji()">Romaji</button>
                    </div>
                </div>
            </main>

            <footer class="hand-footer"><div id="player-hand" class="card-grid mx-auto"></div></footer>
        </div>
    </div>

    <div id="modal-overlay" class="overlay d-none">
        <div class="modal-box p-4 rounded-4 shadow border border-warning text-center">
            <h2 id="modal-title" class="mb-3 fw-bold">HASIL RITUAL</h2>
            <p id="modal-desc" class="small mb-4 text-white"></p>
            <div id="modal-buttons-area" class="d-grid gap-2"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
