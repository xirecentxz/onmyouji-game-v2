<div id="homepage-screen" class="full-overlay container-fluid d-flex flex-column justify-content-center align-items-center text-center">
    <img src="assets/badge.webp" class="main-logo mb-3" alt="Logo">
    <h1 class="game-title display-4 fw-bold">ONMYOJI</h1>
    <p class="game-subtitle lead text-gold">KANJI SEAL RITUAL</p>
    <button class="btn btn-start-custom mt-4 px-5 py-2 rounded-pill fw-bold shadow" onclick="showLevelSelector()">MULAI RITUAL</button>
</div>

<div id="level-selector" class="full-overlay d-none text-center">
    <h2 class="text-gold mb-4">PILIH GULUNGAN SEGEL</h2>
    <div class="container overflow-auto" style="max-height: 70vh;">
        <div class="row g-3 justify-content-center">
            <div class="col-12">
                <button class="btn btn-outline-info w-75 py-3 fw-bold" onclick="startMode('tutorial', 1)">📖 TUTORIAL (No Time Limit)</button>
            </div>
            <div class="col-12 mt-4"><h5 class="text-white-50">MAIN STORY</h5></div>
            <script>
                for(let i=1; i<=10; i++) {
                    document.write(`<div class="col-4 col-md-2">
                        <button class="btn btn-gold-oval w-100 py-2" onclick="startMode('story', ${i})">${i}</button>
                    </div>`);
                }
            </script>
            <div class="col-12 mt-4">
                <button class="btn btn-danger w-75 py-3 fw-bold shadow" onclick="startMode('challenge', 1)">🔥 CHALLENGE (Sudden Death)</button>
            </div>
        </div>
    </div>
    <button class="btn btn-link text-white mt-4" onclick="backToHome()">Kembali</button>
</div>

<div id="game-screen" style="display: none;">
    <div class="game-layout container-fluid">
        <header class="row align-items-center py-2 gx-0 border-bottom border-warning border-opacity-25">
            <div class="col-2 text-start">
                <img src="assets/badge.webp" style="width: 35px; height: auto;"> </div>
            <div class="col-8 px-2">
                <div class="progress bg-dark border border-warning" style="height: 12px; border-radius: 6px;">
                    <div id="hp-progress" class="progress-bar bg-danger shadow-sm" style="width: 100%"></div>
                </div>
            </div>
            <div class="col-2 text-end">
                <div class="d-flex align-items-center justify-content-end gap-1 text-gold fw-bold small">
                    <img src="assets/jam.webp" style="width: 20px; height: auto;"> <span id="time-val">90s</span>
                </div>
            </div>
        </header>

        <main class="ritual-center py-3">
            <div id="stage-banner" class="badge rounded-pill bg-dark border border-gold px-3 mb-2 small">Stage 1</div>
            
            <div class="scroll-box mx-auto">
                <div id="kanji-question" class="kanji-main">九つ</div>
                <div id="kanji-meaning" class="meaning-sub text-muted">sembilan buah</div>
            </div>

            <div id="word-zone" class="answer-row d-flex justify-content-center gap-1 my-3">
                </div>

            <div class="action-footer container">
                <div id="support-container" class="d-flex justify-content-center gap-2 mb-2"></div>
                <button id="confirm-btn" class="btn-segel-main" onclick="confirmWord()"></button>
                <div class="d-flex justify-content-center gap-2 mt-2">
                    <button class="btn btn-gold-oval btn-sm px-3" onclick="clearWord()">Hapus</button>
                    <button class="btn btn-gold-oval btn-sm px-3" onclick="showHint()">Hint</button>
                    <button id="romaji-toggle-btn" class="btn btn-gold-oval btn-sm px-3" onclick="toggleRomaji()">Romaji</button>
                </div>
            </div>
        </main>

        <footer class="hand-footer">
            <div id="player-hand" class="card-grid mx-auto"></div>
        </footer>
    </div>
</div>
