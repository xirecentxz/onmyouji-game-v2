<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onmyoji Kanji Seal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="homepage-screen" class="full-overlay container-fluid d-flex flex-column justify-content-center align-items-center text-center">
        <img src="assets/badge.webp" class="main-logo mb-3" alt="Logo">
        <h1 class="game-title display-4 fw-bold">ONMYOJI</h1>
        <p class="game-subtitle lead text-gold">KANJI SEAL RITUAL</p>
        <button class="btn btn-start-custom mt-4 px-5 py-2 rounded-pill fw-bold" onclick="startGame()">MULAI RITUAL</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="container-fluid game-layout px-2">
            
            <header class="row align-items-center py-2 gx-0">
                <div class="col-2 text-start">
                    <img src="assets/badge.webp" class="icon-header img-fluid">
                </div>
                <div class="col-8 px-2">
                    <div class="progress bg-dark border border-warning" style="height: 25px; border-radius: 12px;">
                        <div id="hp-progress" class="progress-bar bg-success progress-bar-striped progress-bar-animated" 
                             role="progressbar" style="width: 100%"></div>
                    </div>
                </div>
                <div class="col-2 text-end text-gold fw-bold small">
                    <div class="d-flex align-items-center justify-content-end gap-1">
                        <img src="assets/jam.webp" class="icon-jam">
                        <span id="time-val">90s</span>
                    </div>
                </div>
            </header>

            <main class="ritual-center text-center">
                <div id="stage-banner" class="badge rounded-pill bg-dark bg-opacity-50 border border-secondary mb-2">Stage 1: Ritual Angka</div>
                
                <div class="scroll-box mx-auto shadow-lg">
                    <div id="kanji-question" class="kanji-main">九つ</div>
                    <div id="kanji-meaning" class="meaning-sub">sembilan buah</div>
                </div>

                <div class="answer-row d-flex justify-content-center gap-1 my-3">
                    <div class="letter-slot border-0"></div>
                    <div class="letter-slot border-0"></div>
                    <div class="letter-slot border-0"></div>
                    <div class="letter-slot border-0"></div>
                    <div class="letter-slot border-0"></div>
                </div>

                <div class="action-footer container w-100">
                    <div id="support-container" class="d-flex justify-content-center gap-2 mb-3"></div>
                    
                    <button id="confirm-btn" class="btn-segel-main mb-3" onclick="confirmWord()"> </button>
                    
                    <div class="d-flex justify-content-center gap-2 flex-wrap">
                        <button class="btn btn-gold-oval btn-sm" onclick="clearWord()">Hapus</button>
                        <button class="btn btn-gold-oval btn-sm" onclick="showHint()">Hint</button>
                        <button id="romaji-toggle-btn" class="btn btn-gold-oval btn-sm" onclick="toggleRomaji()">Romaji: OFF</button>
                    </div>
                </div>
            </main>

            <footer class="hand-footer pt-3">
                <div id="player-hand" class="card-grid mx-auto"></div>
            </footer>
        </div>
    </div>

    <div id="modal-overlay" class="overlay d-none justify-content-center align-items-center">
        <div class="modal-content-custom p-4 rounded-4 shadow border border-warning text-center">
            <h2 id="modal-title" class="text-gold mb-3">HASIL RITUAL</h2>
            <p id="modal-desc" class="small mb-4 text-white"></p>
            <div id="modal-buttons-area" class="d-grid gap-2"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
