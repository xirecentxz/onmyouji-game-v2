<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onmyoji Kanji Seal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="homepage-screen" class="full-overlay d-flex flex-column justify-content-center align-items-center text-center">
        <img src="assets/badge.webp" class="main-logo mb-3" alt="Logo">
        <h1 class="game-title fw-bold text-white mb-0">ONMYOJI</h1>
        <p class="lead text-gold mt-0">KANJI SEAL RITUAL</p>
        <button class="btn btn-gold-oval mt-4 px-5 py-2 fw-bold shadow" style="font-size: 16px;" onclick="showLevelSelector()">MULAI RITUAL</button>
    </div>

    <div id="level-selector" class="d-none">
        <div class="container">
            <h2 class="text-gold mb-4 fw-bold">PILIH GULUNGAN SEGEL</h2>
            
            <button class="btn btn-outline-info w-75 py-3 fw-bold mb-4" onclick="startMode('tutorial', 1)">📖 TUTORIAL (No Time Limit)</button>
            
            <h5 class="text-white-50 small mb-2">MAIN STORY</h5>
            
            <div class="stage-grid">
                <button class="btn-stage" onclick="startMode('story', 1)">1</button>
                <button class="btn-stage" onclick="startMode('story', 2)">2</button>
                <button class="btn-stage" onclick="startMode('story', 3)">3</button>
                <button class="btn-stage" onclick="startMode('story', 4)">4</button>
                <button class="btn-stage" onclick="startMode('story', 5)">5</button>
                
                <button class="btn-stage" onclick="startMode('story', 6)">6</button>
                <button class="btn-stage" onclick="startMode('story', 7)">7</button>
                <button class="btn-stage" onclick="startMode('story', 8)">8</button>
                <button class="btn-stage" onclick="startMode('story', 9)">9</button>
                <button class="btn-stage" onclick="startMode('story', 10)">10</button>
                
                <button class="btn-stage" onclick="startMode('story', 11)">11</button>
                <button class="btn-stage" disabled>12</button>
                <button class="btn-stage" disabled>13</button>
                <button class="btn-stage" disabled>14</button>
                <button class="btn-stage" disabled>15</button>
            </div>

            <button class="btn btn-danger w-75 py-3 fw-bold shadow mt-4" onclick="startMode('challenge', 1)">🔥 CHALLENGE (Sudden Death)</button>
            
            <br>
            <button class="btn btn-link text-white mt-4" onclick="backToHome()">Kembali</button>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="game-layout">
            
            <header>
                <div class="avatar-container">
                    <img src="assets/badge.webp" class="icon-header" alt="Avatar">
                </div>
                
                <div class="hp-container">
                    <div id="hp-progress"></div>
                </div>
                
                <div class="timer-box text-gold fw-bold small">
                    <img src="assets/jam.webp" class="icon-jam" alt="Timer"> 
                    <span id="time-val">90s</span>
                </div>
            </header>

            <main class="ritual-center text-center">
                <div id="stage-banner">Stage 1</div>
                
                <div class="scroll-box">
                    <div id="kanji-question" class="kanji-main"></div>
                    <div id="kanji-meaning" class="meaning-sub d-none"></div>
                </div>
                
                <div id="word-zone" class="answer-row">
                    </div>

                <div class="action-footer">
                    <div id="support-container"></div>
                    <button id="confirm-btn" class="btn-segel-main" onclick="confirmWord()"></button>
                    
                    <div class="support-actions">
                        <button onclick="clearWord()">Hapus</button>
                        <button onclick="showHint()">Hint</button>
                        <button id="romaji-toggle-btn" onclick="toggleRomaji()">Romaji : Off</button>
                    </div>
                </div>
            </main>

            <footer class="hand-footer">
                <div id="player-hand" class="card-grid"></div>
            </footer>
        </div>
    </div>

    <div id="modal-overlay" class="full-overlay d-none">
        <div class="modal-box">
            <h2 id="modal-title" class="mb-3 fw-bold">HASIL RITUAL</h2>
            <p id="modal-desc" class="small mb-4 text-white"></p>
            <div id="modal-buttons-area" class="d-grid gap-2"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
